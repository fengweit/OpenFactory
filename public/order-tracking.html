<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{padding-top:60px}</style>
<title>Order Tracking — OpenFactory</title>
<meta name="description" content="Track your order in real-time. View production milestones, QC inspection status, and escrow payment progress.">
<style>
  :root {
    --bg: #ffffff; --surface: #f9fafb; --surface-2: #f3f4f6;
    --border: #e5e7eb; --border-2: #d1d5db;
    --text: #111827; --muted: #6b7280; --dim: #9ca3af;
    --accent: #7c3aed; --accent-light: #ede9fe; --accent-border: #ddd6fe; --accent-text: #6d28d9;
    --green: #059669; --green-light: #ecfdf5; --green-border: #a7f3d0; --green-text: #065f46;
    --amber: #d97706; --amber-light: #fffbeb; --amber-border: #fde68a; --amber-text: #92400e;
    --red: #dc2626; --red-light: #fef2f2; --red-border: #fecaca; --red-text: #991b1b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; }
  a { text-decoration: none; color: inherit; }

  /* Hero */
  .hero { padding: 80px 24px 40px; text-align: center; }
  .hero h1 { font-size: clamp(24px, 4vw, 36px); font-weight: 800; color: var(--text); margin-bottom: 10px; letter-spacing: -.5px; }
  .hero p { font-size: 15px; color: var(--muted); max-width: 500px; margin: 0 auto 28px; }

  /* Lookup form */
  .lookup { max-width: 520px; margin: 0 auto 40px; display: flex; gap: 8px; padding: 0 24px; }
  .lookup input {
    flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s;
  }
  .lookup input:focus { border-color: var(--accent); }
  .lookup button {
    padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .lookup button:hover { background: #6d28d9; }

  /* Main container */
  .main { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }

  /* Order header */
  .order-header {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; margin-bottom: 20px;
  }
  .order-header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .order-id { font-size: 18px; font-weight: 800; color: var(--text); }
  .order-id span { font-size: 13px; font-weight: 400; color: var(--muted); }
  .status-badge {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px;
    border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
  }
  .status-pending { background: var(--surface-2); color: var(--dim); }
  .status-confirmed { background: var(--accent-light); color: var(--accent-text); }
  .status-in_production { background: var(--amber-light); color: var(--amber-text); border: 1px solid var(--amber-border); }
  .status-qc { background: var(--accent-light); color: var(--accent-text); border: 1px solid var(--accent-border); }
  .status-shipped { background: var(--green-light); color: var(--green-text); border: 1px solid var(--green-border); }
  .status-delivered { background: var(--green-light); color: var(--green-text); border: 1px solid var(--green-border); }
  .order-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .order-meta-item { }
  .order-meta-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
  .order-meta-value { font-size: 14px; font-weight: 700; color: var(--text); }

  /* Section card */
  .section {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; margin-bottom: 20px;
  }
  .section-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* Timeline */
  .timeline { position: relative; padding-left: 32px; }
  .timeline::before {
    content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px;
    width: 2px; background: var(--border);
  }
  .tl-step { position: relative; padding-bottom: 28px; }
  .tl-step:last-child { padding-bottom: 0; }
  .tl-dot {
    position: absolute; left: -32px; top: 2px; width: 22px; height: 22px;
    border-radius: 50%; border: 2px solid var(--border); background: white;
    display: flex; align-items: center; justify-content: center; font-size: 10px; z-index: 1;
  }
  .tl-dot.done { background: var(--green); border-color: var(--green); color: white; }
  .tl-dot.active { background: var(--accent); border-color: var(--accent); color: white; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,.3); } 50% { box-shadow: 0 0 0 6px rgba(124,58,237,0); } }
  .tl-label { font-size: 13px; font-weight: 700; color: var(--text); }
  .tl-label.pending-label { color: var(--dim); }
  .tl-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tl-note { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; }

  /* Milestone photos */
  .tl-photos { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tl-photo {
    width: 56px; height: 56px; border-radius: 8px; object-fit: cover;
    border: 1px solid var(--border); cursor: pointer; transition: transform .15s;
  }
  .tl-photo:hover { transform: scale(1.08); }

  /* Escrow progress bar */
  .escrow-bar-wrap { margin-bottom: 16px; }
  .escrow-bar {
    display: flex; height: 28px; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border); background: var(--surface);
  }
  .escrow-seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; transition: all .3s;
  }
  .escrow-seg.released { background: var(--green); color: white; }
  .escrow-seg.held { background: var(--surface-2); color: var(--dim); }
  .escrow-seg.disputed { background: var(--red-light); color: var(--red-text); }
  .escrow-legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .escrow-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .escrow-legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .escrow-legend-dot.rel { background: var(--green); }
  .escrow-legend-dot.held { background: var(--surface-2); border: 1px solid var(--border); }

  /* Escrow events table */
  .escrow-events { margin-top: 16px; }
  .escrow-event {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--surface-2); font-size: 12px;
  }
  .escrow-event:last-child { border-bottom: none; }
  .escrow-event-icon { font-size: 14px; }
  .escrow-event-detail { flex: 1; }
  .escrow-event-label { font-weight: 600; color: var(--text); }
  .escrow-event-note { color: var(--muted); }
  .escrow-event-amount { font-weight: 700; color: var(--green-text); white-space: nowrap; }
  .escrow-event-time { font-size: 11px; color: var(--dim); white-space: nowrap; }

  /* QC badge */
  .qc-card {
    display: flex; align-items: center; gap: 12px; padding: 16px;
    background: var(--surface); border-radius: 10px; border: 1px solid var(--border);
  }
  .qc-icon { font-size: 28px; }
  .qc-info { flex: 1; }
  .qc-provider { font-size: 13px; font-weight: 700; color: var(--text); text-transform: uppercase; }
  .qc-type { font-size: 11px; color: var(--muted); }
  .qc-status-badge {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase;
  }
  .qc-requested { background: var(--amber-light); color: var(--amber-text); border: 1px solid var(--amber-border); }
  .qc-scheduled { background: var(--accent-light); color: var(--accent-text); border: 1px solid var(--accent-border); }
  .qc-completed { background: var(--green-light); color: var(--green-text); border: 1px solid var(--green-border); }
  .qc-failed { background: var(--red-light); color: var(--red-text); border: 1px solid var(--red-border); }
  .qc-report-link { font-size: 11px; color: var(--accent-text); text-decoration: underline; margin-top: 4px; display: inline-block; }

  /* Lightbox */
  .lightbox {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000;
    background: rgba(0,0,0,.85); display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  /* Empty / error */
  .empty { text-align: center; padding: 64px 0; }
  .empty-icon { font-size: 40px; margin-bottom: 14px; }
  .empty-msg { font-size: 15px; color: var(--muted); }

  .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .hero { padding: 80px 16px 40px; }
    .lookup { padding: 0 16px; flex-direction: column; }
    .main { padding: 0 16px 60px; }
    .order-header, .section { padding: 16px; }
    .order-meta { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1 data-en="Order Tracking" data-zh="订单追踪">Order Tracking</h1>
  <p data-en="Enter your order ID to view real-time production milestones, QC status, and escrow payment progress." data-zh="输入订单号，实时查看生产进度、质检状态和资金托管支付进度。">Enter your order ID to view real-time production milestones, QC status, and escrow payment progress.</p>
</div>

<!-- LOOKUP -->
<div class="lookup">
  <input type="text" id="order-input" placeholder="e.g. ord-a1b2c3d4" data-placeholder-en="e.g. ord-a1b2c3d4" data-placeholder-zh="例如 ord-a1b2c3d4">
  <button onclick="lookupOrder()" data-en="Track Order" data-zh="查询订单">Track Order</button>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main-content"></div>

<div style="height:20px;"></div>
<div style="text-align:center;padding:12px;font-size:12px;color:#9ca3af;" data-en="Shenzhen, China · hello@openfactory.ai · ICP备案申请中" data-zh="深圳，中国 · hello@openfactory.ai · ICP备案申请中">Shenzhen, China · hello@openfactory.ai · ICP备案申请中</div>

<script>
const API = window.location.origin;
const _token = localStorage.getItem('token');
const _headers = _token ? { 'Authorization': 'Bearer ' + _token } : {};

const STAGES = [
  { key: 'material_received', en: 'Material Received', zh: '物料到货', icon: '📦' },
  { key: 'production_started', en: 'Production Started', zh: '开始生产', icon: '🏭' },
  { key: 'qc_in_progress', en: 'QC In Progress', zh: '质检中', icon: '🔍' },
  { key: 'qc_pass', en: 'QC Passed', zh: '质检通过', icon: '✅' },
  { key: 'ready_for_shipment', en: 'Ready for Shipment', zh: '待发货', icon: '📋' },
  { key: 'shipped', en: 'Shipped', zh: '已发货', icon: '🚢' },
];

// Escrow tranches: which milestone triggers which release
const ESCROW_TRANCHES = [
  { pct: 30, label_en: 'Deposit (30%)', label_zh: '定金 (30%)', trigger: 'deposit_held' },
  { pct: 40, label_en: 'Production (40%)', label_zh: '生产款 (40%)', trigger: 'qc_released' },
  { pct: 30, label_en: 'Final (30%)', label_zh: '尾款 (30%)', trigger: 'final_released' },
];

// Read order ID from URL or input
function getOrderIdFromUrl() {
  var params = new URLSearchParams(location.search);
  return params.get('id') || '';
}

function lookupOrder() {
  var id = document.getElementById('order-input').value.trim();
  if (!id) return;
  history.replaceState(null, '', '/order-tracking.html?id=' + encodeURIComponent(id));
  loadOrder(id);
}

document.getElementById('order-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') lookupOrder();
});

async function loadOrder(orderId) {
  var lang = localStorage.getItem('lang') || 'en';
  var main = document.getElementById('main-content');
  main.innerHTML = '<div style="text-align:center;padding:60px;"><span class="loader"></span></div>';

  try {
    // Fetch order, milestones (with photos), QC requests in parallel
    var orderP = fetch(API + '/orders/' + encodeURIComponent(orderId), { headers: _headers }).then(function(r) { if (!r.ok) throw new Error('Order not found'); return r.json(); });
    var milestonesP = fetch(API + '/orders/' + encodeURIComponent(orderId) + '/milestones', { headers: _headers }).then(function(r) { return r.ok ? r.json() : { milestones: [] }; });
    var qcP = fetch(API + '/orders/' + encodeURIComponent(orderId) + '/qc-requests', { headers: _headers }).then(function(r) { return r.ok ? r.json() : { qc_requests: [] }; });

    var results = await Promise.all([orderP, milestonesP, qcP]);
    var order = results[0];
    var milestonesData = results[1];
    var qcData = results[2];

    renderOrder(order, milestonesData.milestones || [], qcData.qc_requests || []);
  } catch (e) {
    main.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-msg">' +
      (lang === 'zh' ? '未找到订单。请检查订单号后重试。' : 'Order not found. Please check the order ID and try again.') +
      '</div></div>';
  }
}

function renderOrder(order, milestones, qcRequests) {
  var lang = localStorage.getItem('lang') || 'en';
  var main = document.getElementById('main-content');
  var html = '';

  // ─── Order Header ───
  var statusLabel = order.status.replace(/_/g, ' ');
  html += '<div class="order-header">';
  html += '<div class="order-header-top">';
  html += '<div class="order-id">' + order.order_id + ' <span>' + (lang === 'zh' ? '订单' : 'Order') + '</span></div>';
  html += '<span class="status-badge status-' + order.status + '">' + statusLabel + '</span>';
  html += '</div>';
  html += '<div class="order-meta">';
  html += metaItem(lang === 'zh' ? '工厂' : 'Factory', order.factory_id);
  html += metaItem(lang === 'zh' ? '数量' : 'Quantity', Number(order.quantity).toLocaleString());
  html += metaItem(lang === 'zh' ? '总金额' : 'Total', '$' + Number(order.total_price_usd).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}));
  html += metaItem(lang === 'zh' ? '预计发货' : 'Est. Ship', order.estimated_ship_date ? formatDate(order.estimated_ship_date) : '—');
  html += metaItem(lang === 'zh' ? '下单日期' : 'Placed', formatDate(order.created_at));
  html += '</div></div>';

  // ─── Milestone Timeline ───
  html += '<div class="section">';
  html += '<div class="section-title">📍 ' + (lang === 'zh' ? '生产进度' : 'Production Milestones') + '</div>';
  html += renderTimeline(order, milestones, lang);
  html += '</div>';

  // ─── Escrow Progress ───
  html += '<div class="section">';
  html += '<div class="section-title">💰 ' + (lang === 'zh' ? '资金托管进度' : 'Escrow Payment Progress') + '</div>';
  html += renderEscrow(order, lang);
  html += '</div>';

  // ─── QC Status ───
  if (qcRequests.length > 0) {
    html += '<div class="section">';
    html += '<div class="section-title">🔬 ' + (lang === 'zh' ? '质检状态' : 'QC Inspection Status') + '</div>';
    html += renderQc(qcRequests, lang);
    html += '</div>';
  }

  main.innerHTML = html;
  if (window.applyLang) window.applyLang(lang);
}

function metaItem(label, value) {
  return '<div class="order-meta-item"><div class="order-meta-label">' + label + '</div><div class="order-meta-value">' + value + '</div></div>';
}

// ─── Timeline ───
function renderTimeline(order, milestones, lang) {
  var completed = {};
  milestones.forEach(function(m) { completed[m.milestone] = m; });

  // Find the last completed stage index to determine the "active" one
  var lastDoneIdx = -1;
  STAGES.forEach(function(s, i) { if (completed[s.key]) lastDoneIdx = i; });

  var html = '<div class="timeline">';
  STAGES.forEach(function(stage, i) {
    var m = completed[stage.key];
    var isDone = Boolean(m);
    var isActive = (i === lastDoneIdx + 1) && !isDone;
    var label = lang === 'zh' ? stage.zh : stage.en;

    html += '<div class="tl-step">';
    html += '<div class="tl-dot ' + (isDone ? 'done' : (isActive ? 'active' : '')) + '">' + (isDone ? '✓' : stage.icon) + '</div>';
    html += '<div class="tl-label ' + (isDone || isActive ? '' : 'pending-label') + '">' + label + '</div>';

    if (m) {
      html += '<div class="tl-time">' + formatDateTime(m.created_at) + '</div>';
      if (m.note) html += '<div class="tl-note">' + escapeHtml(m.note) + '</div>';

      // Photos from enriched milestones endpoint
      var photos = m.uploaded_photos || [];
      if (m.photo_urls && m.photo_urls.length > 0) {
        m.photo_urls.forEach(function(u) { photos.push({ file_path: u }); });
      }
      if (photos.length > 0) {
        html += '<div class="tl-photos">';
        photos.forEach(function(p) {
          var src = p.file_path || p;
          html += '<img class="tl-photo" src="' + escapeHtml(src) + '" alt="Milestone photo" onclick="openLightbox(this.src)" loading="lazy">';
        });
        html += '</div>';
      }
    } else if (isActive) {
      html += '<div class="tl-time" style="color:var(--accent);">' + (lang === 'zh' ? '等待中...' : 'Awaiting...') + '</div>';
    }

    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ─── Escrow ───
function renderEscrow(order, lang) {
  var escrowStatus = order.escrow_status || 'pending_deposit';
  var totalUsd = Number(order.total_price_usd) || 0;

  // Determine which tranches are released based on escrow_status
  // States: pending_deposit → deposit_held → production_released → qc_released → final_released
  var releasedStates = {
    'pending_deposit': [],
    'deposit_held': ['deposit_held'],
    'production_released': ['deposit_held', 'production_released'],
    'qc_released': ['deposit_held', 'production_released', 'qc_released'],
    'final_released': ['deposit_held', 'production_released', 'qc_released', 'final_released'],
    'disputed': [],
    'refunded': [],
  };
  var released = releasedStates[escrowStatus] || [];

  // Also check escrow_events from the order for actual released amounts
  var events = order.escrow_events || [];
  var releasedTotal = 0;
  events.forEach(function(e) {
    if (e.amount_usd && e.to_status !== 'disputed' && e.to_status !== 'refunded') {
      releasedTotal += Number(e.amount_usd);
    }
  });

  var html = '<div class="escrow-bar-wrap">';

  // Progress bar segments
  html += '<div class="escrow-bar">';
  ESCROW_TRANCHES.forEach(function(t) {
    var isReleased = released.indexOf(t.trigger) !== -1;
    var isDisputed = escrowStatus === 'disputed';
    var cls = isDisputed ? 'disputed' : (isReleased ? 'released' : 'held');
    var label = lang === 'zh' ? t.label_zh : t.label_en;
    html += '<div class="escrow-seg ' + cls + '" style="width:' + t.pct + '%;" title="' + label + '">' + t.pct + '%</div>';
  });
  html += '</div>';

  // Legend
  var releasedAmt = releasedTotal > 0 ? releasedTotal : (released.length > 0 ? (released.length === 1 ? totalUsd * 0.3 : released.length === 2 ? totalUsd * 0.7 : released.length >= 3 ? totalUsd : 0) : 0);
  var heldAmt = totalUsd - releasedAmt;
  html += '<div class="escrow-legend">';
  html += '<div class="escrow-legend-item"><div class="escrow-legend-dot rel"></div> ' + (lang === 'zh' ? '已释放' : 'Released') + ': $' + releasedAmt.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</div>';
  html += '<div class="escrow-legend-item"><div class="escrow-legend-dot held"></div> ' + (lang === 'zh' ? '托管中' : 'Held') + ': $' + Math.max(0, heldAmt).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</div>';
  if (escrowStatus === 'disputed') {
    html += '<div class="escrow-legend-item" style="color:var(--red);">⚠ ' + (lang === 'zh' ? '争议中' : 'Disputed') + '</div>';
  }
  html += '</div>';
  html += '</div>';

  // Escrow events audit trail
  if (events.length > 0) {
    html += '<div class="escrow-events">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px;">' + (lang === 'zh' ? '交易记录' : 'Transaction History') + '</div>';
    events.forEach(function(e) {
      var icon = e.to_status === 'disputed' ? '⚠️' : (e.to_status === 'refunded' ? '↩️' : '✓');
      html += '<div class="escrow-event">';
      html += '<div class="escrow-event-icon">' + icon + '</div>';
      html += '<div class="escrow-event-detail">';
      html += '<div class="escrow-event-label">' + escapeHtml(e.from_status.replace(/_/g, ' ')) + ' → ' + escapeHtml(e.to_status.replace(/_/g, ' ')) + '</div>';
      if (e.note) html += '<div class="escrow-event-note">' + escapeHtml(e.note) + '</div>';
      html += '</div>';
      if (e.amount_usd) html += '<div class="escrow-event-amount">$' + Number(e.amount_usd).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</div>';
      html += '<div class="escrow-event-time">' + formatDateTime(e.created_at) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  return html;
}

// ─── QC ───
function renderQc(requests, lang) {
  var html = '';
  requests.forEach(function(qc) {
    var statusCls = 'qc-' + (qc.status || 'requested');
    var providerName = (qc.provider || 'unknown').toUpperCase();
    var typeName = qc.inspection_type ? qc.inspection_type.replace(/_/g, ' ') : '';
    var icon = qc.status === 'completed' ? (qc.passed ? '✅' : '❌') : (qc.status === 'scheduled' ? '📅' : '🔍');

    html += '<div class="qc-card" style="margin-bottom:10px;">';
    html += '<div class="qc-icon">' + icon + '</div>';
    html += '<div class="qc-info">';
    html += '<div class="qc-provider">' + escapeHtml(providerName) + '</div>';
    if (typeName) html += '<div class="qc-type">' + typeName + '</div>';
    if (qc.report_url) html += '<a href="' + escapeHtml(qc.report_url) + '" target="_blank" class="qc-report-link">' + (lang === 'zh' ? '查看报告 ↗' : 'View Report ↗') + '</a>';
    html += '</div>';
    html += '<span class="qc-status-badge ' + statusCls + '">' + (qc.status || 'requested') + '</span>';
    html += '</div>';
  });
  return html;
}

// ─── Helpers ───
function formatDate(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function formatDateTime(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) +
    ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

function openLightbox(src) {
  var lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = '<img src="' + src + '">';
  lb.onclick = function() { lb.remove(); };
  document.body.appendChild(lb);
}

// Auto-load from URL param
var _initId = getOrderIdFromUrl();
if (_initId) {
  document.getElementById('order-input').value = _initId;
  loadOrder(_initId);
}
</script>
