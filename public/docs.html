<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{padding-top:60px}</style>
<title>API Reference — OpenFactory</title>
<meta name="description" content="OpenFactory API documentation. REST endpoints for factory discovery, quotes, orders, milestones, QC, escrow, and MCP tools.">
<style>
  :root {
    --bg: #ffffff; --surface: #f9fafb; --surface-2: #f3f4f6;
    --border: #e5e7eb; --border-2: #d1d5db;
    --text: #111827; --muted: #6b7280; --dim: #9ca3af;
    --accent: #7c3aed; --accent-light: #ede9fe; --accent-border: #ddd6fe; --accent-text: #6d28d9;
    --green: #059669; --green-light: #ecfdf5; --green-border: #a7f3d0; --green-text: #065f46;
    --blue: #2563eb; --blue-light: #eff6ff; --blue-border: #bfdbfe; --blue-text: #1e40af;
    --amber: #d97706; --amber-light: #fffbeb; --amber-border: #fde68a; --amber-text: #92400e;
    --red: #dc2626; --red-light: #fef2f2; --red-border: #fecaca; --red-text: #991b1b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; }
  a { color: var(--accent-text); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .docs-layout { display: flex; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 60px); }

  /* Sidebar */
  .sidebar {
    width: 250px; flex-shrink: 0; position: sticky; top: 60px; height: calc(100vh - 60px);
    overflow-y: auto; border-right: 1px solid var(--border); padding: 24px 0;
    font-size: 13px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
  .sidebar-section { margin-bottom: 16px; }
  .sidebar-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); margin-bottom: 4px; padding: 0 16px; }
  .sidebar a {
    display: flex; align-items: center; gap: 6px; padding: 4px 16px; border-radius: 0;
    color: var(--muted); font-weight: 500; transition: all .15s; text-decoration: none;
    border-left: 2px solid transparent;
  }
  .sidebar a:hover { color: var(--text); background: var(--surface); text-decoration: none; }
  .sidebar a.active { color: var(--accent-text); background: var(--accent-light); border-left-color: var(--accent); }
  .sidebar .s-method {
    font-size: 9px; font-weight: 800; font-family: 'SF Mono', 'Fira Code', monospace;
    min-width: 32px; text-align: center;
  }
  .sidebar .s-method.get { color: var(--green); }
  .sidebar .s-method.post { color: var(--blue); }
  .sidebar .s-method.patch { color: var(--amber); }

  /* Main content */
  .docs-main { flex: 1; padding: 32px 40px 80px; min-width: 0; }
  .docs-main h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -.5px; }
  .subtitle { font-size: 15px; color: var(--muted); margin-bottom: 24px; }

  .docs-meta { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .docs-meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: 8px; }
  .docs-meta-item code { font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text); font-size: 12px; }

  /* Group */
  .ep-group { margin-bottom: 48px; scroll-margin-top: 80px; }
  .group-title {
    font-size: 20px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border); letter-spacing: -.3px;
    display: flex; align-items: center; gap: 10px;
  }

  /* Endpoint card */
  .ep-card {
    background: white; border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 16px; overflow: hidden; scroll-margin-top: 80px;
    transition: border-color .15s;
  }
  .ep-card:hover { border-color: var(--border-2); }
  .ep-header {
    padding: 12px 16px; display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none; transition: background .1s;
  }
  .ep-header:hover { background: var(--surface); }
  .badge-method {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
    font-weight: 700; font-family: 'SF Mono', 'Fira Code', monospace; min-width: 48px;
    text-align: center;
  }
  .badge-get { background: var(--green-light); color: var(--green-text); border: 1px solid var(--green-border); }
  .badge-post { background: var(--blue-light); color: var(--blue-text); border: 1px solid var(--blue-border); }
  .badge-patch { background: var(--amber-light); color: var(--amber-text); border: 1px solid var(--amber-border); }
  .ep-path { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; font-weight: 600; color: var(--text); }
  .ep-short { font-size: 13px; color: var(--dim); margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
  .ep-toggle { color: var(--dim); font-size: 11px; margin-left: 8px; transition: transform .2s; }
  .ep-card.open .ep-toggle { transform: rotate(180deg); }
  .ep-body { display: none; border-top: 1px solid var(--border); padding: 16px; }
  .ep-card.open .ep-body { display: block; }

  .ep-desc { font-size: 14px; color: var(--text); margin-bottom: 14px; }
  .ep-section { margin-bottom: 16px; }
  .ep-section:last-child { margin-bottom: 0; }
  .ep-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); margin-bottom: 6px; }

  .auth-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .auth-none { background: var(--green-light); color: var(--green-text); }
  .auth-jwt { background: var(--amber-light); color: var(--amber-text); }

  /* Params table */
  .params-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 4px 0; }
  .params-table th {
    text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .4px;
    color: var(--dim); padding: 6px 8px; border-bottom: 1px solid var(--border);
  }
  .params-table td { padding: 6px 8px; border-bottom: 1px solid var(--surface-2); vertical-align: top; }
  .params-table .p-name { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; font-weight: 600; color: var(--accent-text); }
  .params-table .p-type { font-size: 11px; color: var(--dim); }

  /* Code block */
  pre {
    background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 14px 16px;
    overflow-x: auto; font-size: 12px; line-height: 1.6; margin: 6px 0;
    font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace; position: relative;
  }
  pre .ck { color: #89b4fa; }
  pre .cs { color: #a6e3a1; }
  pre .cn { color: #f9e2af; }
  pre .cb { color: #f38ba8; }
  pre .cc { color: #6c7086; }
  code {
    background: var(--surface-2); padding: 1px 5px; border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
  }
  pre code { background: none; padding: 0; }

  .copy-btn {
    position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1); color: #9ca3af; font-size: 11px;
    padding: 2px 8px; border-radius: 4px; cursor: pointer; transition: all .12s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.12); color: #d1d5db; }

  /* Try It */
  .try-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent); color: white; border: none;
    padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .15s; margin-top: 8px;
  }
  .try-btn:hover { background: var(--accent-text); }
  .try-output { display: none; margin-top: 10px; }
  .try-output.show { display: block; }

  /* Mobile toggle */
  .sidebar-toggle {
    display: none; position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: var(--accent); color: white; border: none; width: 44px; height: 44px;
    border-radius: 50%; font-size: 18px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(124,58,237,0.3);
  }

  @media (max-width: 800px) {
    .docs-layout { flex-direction: column; }
    .sidebar { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; max-height: 50vh; }
    .sidebar-section { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 6px; }
    .sidebar-title { width: 100%; }
    .sidebar a { padding: 3px 10px; font-size: 12px; border-left: none; border-radius: 6px; }
    .docs-main { padding: 24px 16px 60px; }
    .ep-short { display: none; }
  }
</style>
</head>

<div class="docs-layout">

<!-- Sidebar -->
<nav class="sidebar" id="sidebar"></nav>

<!-- Main content -->
<main class="docs-main">
<h1 data-en="OpenFactory API Reference" data-zh="OpenFactory API 参考文档">OpenFactory API Reference</h1>
<p class="subtitle" data-en="REST API + MCP tools for AI-native manufacturing sourcing. Version 0.3.0" data-zh="面向AI的制造业采购 REST API + MCP 工具。版本 0.3.0">REST API + MCP tools for AI-native manufacturing sourcing. Version 0.3.0</p>

<script>
/* ── Endpoint definitions ───────────────────────────────────────────────── */
var GROUPS = [
  { id:'factories', label:'Factories', icon:'🏭', endpoints:[
    { m:'GET', p:'/factories', d:'Search factories with filters', auth:'none',
      params:[['category','string','Product category (e.g. electronics_accessories)'],['max_moq','number','Maximum acceptable MOQ'],['price_tier','string','budget / mid / premium'],['min_rating','number','Minimum rating (0-5)'],['verified_only','boolean','Only verified factories'],['sort','string','Sort field'],['min_trust_score','number','Minimum trust score (0-100)']],
      res:'{\n  "factories": [\n    {\n      "id": "sz-005",\n      "name": "Qianhai Global Accessories",\n      "name_zh": "前海全球配件有限公司",\n      "location": { "city": "Shenzhen", "district": "Qianhai" },\n      "categories": ["electronics_accessories", "cable_assembly"],\n      "moq": 300,\n      "lead_time_days": { "sample": 5, "production": 22 },\n      "certifications": ["ISO9001", "CE", "RoHS"],\n      "price_tier": "mid",\n      "verified": true,\n      "rating": 4.5\n    }\n  ],\n  "count": 1\n}' },

    { m:'GET', p:'/factories/:id/verify-identity', d:'Identity trust data (USCC, legal rep)', auth:'none',

      res:'{\n  "factory_id": "sz-006",\n  "factory_name": "南山物联网方案",\n  "category": "pcb_assembly",\n  "quantity": 1000,\n  "unit_price_usd": 4.20,\n  "total_price_usd": 4200,\n  "lead_time_days": 18,\n  "express_available": true,\n  "capacity_available": 8000,\n  "confidence": 0.88,\n  "valid_hours": 48\n}' },
    { m:'GET', p:'/factories/:id/capacity', d:'Current declared capacity', auth:'none',

    { m:'GET', p:'/factories/:id/quotes', d:'Quote requests received by factory', auth:'none',
      res:'[\n  {\n    "quote_id": "q-abc12345",\n    "factory_id": "sz-005",\n    "product_description": "Custom phone cases",\n    "quantity": 1000,\n    "unit_price_usd": 2.58,\n    "total_price_usd": 2580,\n    "lead_time_days": 22\n  }\n]' },
    { m:'GET', p:'/factories/:id/orders', d:'Orders placed with factory', auth:'none',

    { m:'GET', p:'/factories/:id/performance', d:'Earned trust metrics', auth:'none',

  { id:'capacity', label:'Capacity', icon:'📊', endpoints:[

/* ── Render ──────────────────────────────────────────────────────────────── */
var BASE = window.location.origin;
document.getElementById('base-url').textContent = BASE;

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function hlJSON(s) {
  if (!s || s.indexOf('{') === -1 && s.indexOf('[') === -1) return esc(s);
  return esc(s)
    .replace(/(&quot;[^&]*?&quot;)\s*:/g, '<span class="ck">$1</span>:')
    .replace(/:\s*(&quot;[^&]*?&quot;)/g, ': <span class="cs">$1</span>')
    .replace(/"([^"]*?)"\s*:/g, '<span class="ck">"$1"</span>:')
    .replace(/:\s*"([^"]*?)"/g, ': <span class="cs">"$1"</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span class="cn">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="cb">$1</span>');
}

function uid(ep, idx) { return 'ep-' + idx; }

// Build sidebar
var sideHTML = '';
var epIdx = 0;
GROUPS.forEach(function(g) {
  sideHTML += '<div class="sidebar-section">';
  sideHTML += '<div class="sidebar-title">' + g.icon + ' ' + g.label + '</div>';
  g.endpoints.forEach(function(ep) {
    var mc = ep.m.toLowerCase();
    sideHTML += '<a href="#ep-' + epIdx + '" data-ep="ep-' + epIdx + '"><span class="s-method ' + mc + '">' + ep.m + '</span>' + ep.p + '</a>';
    epIdx++;
  });
  sideHTML += '</div>';
});
document.getElementById('sidebar').innerHTML = sideHTML;

// Build main content
var mainHTML = '';
epIdx = 0;
GROUPS.forEach(function(g) {
  mainHTML += '<div class="ep-group" id="' + g.id + '">';
  mainHTML += '<div class="group-title">' + g.icon + ' ' + g.label + '</div>';
  g.endpoints.forEach(function(ep) {
    var mc = ep.m.toLowerCase();
    var eid = 'ep-' + epIdx;
    mainHTML += '<div class="ep-card" id="' + eid + '">';
    // Header
    mainHTML += '<div class="ep-header" onclick="toggleEp(this)">';
    mainHTML += '<span class="badge-method badge-' + mc + '">' + ep.m + '</span>';
    mainHTML += '<span class="ep-path">' + ep.p + '</span>';
    mainHTML += '<span class="ep-short">' + ep.d + '</span>';
    mainHTML += '<span class="ep-toggle">▼</span>';
    mainHTML += '</div>';
    // Body
    mainHTML += '<div class="ep-body">';
    mainHTML += '<p class="ep-desc">' + ep.d + '</p>';
    // Auth
    mainHTML += '<div class="ep-section"><div class="ep-label">Authentication</div>';
    mainHTML += ep.auth === 'jwt'
      ? '<span class="auth-badge auth-jwt">🔐 JWT Required</span>'
      : '<span class="auth-badge auth-none">🌐 Public</span>';
    mainHTML += '</div>';
    // Params
    if (ep.params && ep.params.length) {
      mainHTML += '<div class="ep-section"><div class="ep-label">Query Parameters</div>';
      mainHTML += '<table class="params-table"><thead><tr><th>Param</th><th>Type</th><th>Description</th></tr></thead><tbody>';
      ep.params.forEach(function(p) {
        mainHTML += '<tr><td><span class="p-name">' + p[0] + '</span></td><td><span class="p-type">' + p[1] + '</span></td><td>' + p[2] + '</td></tr>';
      });
      mainHTML += '</tbody></table></div>';
    }
    // Request
    if (ep.req) {
      mainHTML += '<div class="ep-section"><div class="ep-label">Request Body</div>';
      mainHTML += '<pre><button class="copy-btn" onclick="copyPre(this)">Copy</button><code>' + hlJSON(ep.req) + '</code></pre>';
      mainHTML += '</div>';
    }
    // Response
    if (ep.res) {
      mainHTML += '<div class="ep-section"><div class="ep-label">Response</div>';
      mainHTML += '<pre><button class="copy-btn" onclick="copyPre(this)">Copy</button><code>' + hlJSON(ep.res) + '</code></pre>';
      mainHTML += '</div>';
    }
    // Try It
    mainHTML += '<div class="ep-section">';
    mainHTML += '<button class="try-btn" onclick="toggleTry(\'' + eid + '-try\')">▶ Try It</button>';
    mainHTML += '<div class="try-output" id="' + eid + '-try">' + buildTryIt(ep) + '</div>';
    mainHTML += '</div>';
    mainHTML += '</div></div>';
    epIdx++;
  });
  mainHTML += '</div>';
});
document.getElementById('content').innerHTML = mainHTML;

function buildTryIt(ep) {
  var url = BASE + ep.p;
  var jwt = "localStorage.getItem('token') || '<your-jwt>'";
  var code;
  if (ep.m === 'GET') {
    var hdr = ep.auth === 'jwt'
      ? "{\n    headers: { 'Authorization': `Bearer ${" + jwt + "}` }\n  }"
      : "";
    code = "const res = await fetch('" + url + "'" + (hdr ? ', ' + hdr : '') + ");\nconst data = await res.json();\nconsole.log(data);";
  } else {
    var hasBody = ep.req && ep.req.indexOf('{') !== -1;
    var bodyLine = hasBody ? ",\n    body: JSON.stringify(" + ep.req.replace(/\n/g, '\n    ') + ")" : '';
    var authLine = ep.auth === 'jwt' ? ",\n      'Authorization': `Bearer ${" + jwt + "}`" : '';
    code = "const res = await fetch('" + url + "', {\n    method: '" + ep.m + "',\n    headers: {\n      'Content-Type': 'application/json'" + authLine + "\n    }" + bodyLine + "\n  });\nconst data = await res.json();\nconsole.log(data);";
  }
  return '<pre><button class="copy-btn" onclick="copyPre(this)">Copy</button><code>' + esc(code) + '</code></pre>';
}

/* ── Interactions ────────────────────────────────────────────────────────── */
function toggleEp(head) { head.parentElement.classList.toggle('open'); }
function toggleTry(id) { document.getElementById(id).classList.toggle('show'); }

function copyPre(btn) {
  var code = btn.parentElement.querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(function() {
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1200);
  });
}

// Sidebar active tracking
var sLinks = document.querySelectorAll('.sidebar a[data-ep]');
var observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      sLinks.forEach(function(l) { l.classList.remove('active'); });
      var link = document.querySelector('.sidebar a[data-ep="' + entry.target.id + '"]');
      if (link) { link.classList.add('active'); link.scrollIntoView({ block: 'nearest' }); }
    }
  });
}, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });
document.querySelectorAll('.ep-card').forEach(function(el) { observer.observe(el); });
</script>
