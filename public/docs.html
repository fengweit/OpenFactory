<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{padding-top:60px}</style>
<title>API Docs — OpenFactory</title>
<style>
  :root {
    --bg: #ffffff; --surface: #f9fafb; --border: #e5e7eb;
    --text: #111827; --muted: #6b7280; --dim: #9ca3af;
    --accent: #7c3aed; --accent-light: #ede9fe; --accent-border: #ddd6fe; --accent-text: #6d28d9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }

  .docs-header {
    max-width: 1200px; margin: 0 auto; padding: 48px 32px 32px; text-align: center;
  }
  .docs-header .eyebrow {
    display: inline-block; background: var(--accent-light); border: 1px solid var(--accent-border);
    color: var(--accent-text); padding: 4px 14px; border-radius: 20px; font-size: 12px;
    font-weight: 600; margin-bottom: 16px; letter-spacing: 0.3px;
  }
  .docs-header h1 {
    font-size: clamp(28px, 3.5vw, 44px); font-weight: 800; letter-spacing: -1px;
    color: var(--text); margin-bottom: 8px; line-height: 1.1;
  }
  .docs-header p { font-size: 16px; color: var(--muted); margin-bottom: 0; }

  #swagger-ui-wrap {
    max-width: 1200px; margin: 0 auto; padding: 0 32px 64px;
  }

  /* Swagger UI theme overrides to match OpenFactory purple palette */
  .swagger-ui .topbar { display: none; }
  .swagger-ui .info { margin: 20px 0; }
  .swagger-ui .info .title { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
  .swagger-ui .scheme-container { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
  .swagger-ui .opblock-tag { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-weight: 700; border-bottom: 1px solid var(--border); }
  .swagger-ui .opblock .opblock-summary-operation-id,
  .swagger-ui .opblock .opblock-summary-path,
  .swagger-ui .opblock .opblock-summary-description { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
  .swagger-ui .btn { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; border-radius: 6px; }
  .swagger-ui .btn.authorize { background: var(--accent); border-color: var(--accent); color: white; }
  .swagger-ui .btn.authorize svg { fill: white; }

  footer {
    border-top: 1px solid var(--border); padding: 28px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-logo { font-weight: 800; font-size: 14px; color: var(--text); text-decoration: none; }
  .footer-links { display: flex; gap: 28px; }
  .footer-link { color: var(--dim); font-size: 13px; text-decoration: none; }
  .footer-link:hover { color: var(--muted); }
  .footer-note { font-size: 12px; color: var(--dim); }

  @media (max-width: 720px) {
    .docs-header { padding: 32px 20px 24px; }
    #swagger-ui-wrap { padding: 0 16px 48px; }
    footer { flex-direction: column; gap: 16px; text-align: center; }
    .footer-links { flex-wrap: wrap; justify-content: center; }
  }
</style>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
</head>
<body>

<div class="docs-header">
  <div class="eyebrow" data-en="S02-08 · Interactive API Reference" data-zh="S02-08 · 交互式API文档">S02-08 · Interactive API Reference</div>
  <h1 data-en="API Documentation" data-zh="API 文档">API Documentation</h1>
  <p data-en="Explore all 38 OpenFactory endpoints. Try requests live against the running server." data-zh="浏览所有38个OpenFactory端点，可直接在运行中的服务器上测试请求。">Explore all 38 OpenFactory endpoints. Try requests live against the running server.</p>
</div>

<div id="swagger-ui-wrap"></div>

<footer>
  <a href="/" class="footer-logo">🏭 OpenFactory</a>
  <div class="footer-links">
    <a href="/agent.html" class="footer-link" data-en="API Demo" data-zh="API演示">API Demo</a>
    <a href="/factories.html" class="footer-link" data-en="Factories" data-zh="工厂目录">Factories</a>
    <a href="/onboard.html" class="footer-link" data-en="Join" data-zh="加入">Join</a>
    <a href="https://github.com/fengweit/OpenFactory" class="footer-link" target="_blank">GitHub</a>
  </div>
  <div class="footer-note" data-en="Built in Shenzhen" data-zh="深圳制造">Built in Shenzhen</div>
</footer>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
  SwaggerUIBundle({
    url: window.location.origin + '/openapi.json',
    dom_id: '#swagger-ui-wrap',
    deepLinking: true,
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
    layout: 'BaseLayout',
  });
</script>
<script src="/nav.js"></script>
</body>
</html>
