<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{padding-top:60px}</style>
<title>API Documentation — OpenFactory</title>
<meta name="description" content="OpenFactory API documentation. REST endpoints for factory discovery, quotes, orders, milestones, QC, escrow, trust scores, and more.">
<style>
  :root {
    --bg: #ffffff; --surface: #f9fafb; --surface-2: #f3f4f6;
    --border: #e5e7eb; --border-2: #d1d5db;
    --text: #111827; --muted: #6b7280; --dim: #9ca3af;
    --accent: #7c3aed; --accent-light: #ede9fe; --accent-border: #ddd6fe; --accent-text: #6d28d9;
    --green: #059669; --green-light: #ecfdf5; --green-border: #a7f3d0; --green-text: #065f46;
    --blue: #2563eb; --blue-light: #eff6ff; --blue-border: #bfdbfe; --blue-text: #1e40af;
    --amber: #d97706; --amber-light: #fffbeb; --amber-border: #fde68a; --amber-text: #92400e;
    --red: #dc2626; --red-light: #fef2f2; --red-border: #fecaca;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; }
  a { color: var(--accent-text); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .docs-layout { display: flex; max-width: 1280px; margin: 0 auto; min-height: calc(100vh - 60px); }

  /* Sidebar */
  .sidebar {
    width: 260px; flex-shrink: 0; position: sticky; top: 60px; height: calc(100vh - 60px);
    overflow-y: auto; border-right: 1px solid var(--border); padding: 20px 0; font-size: 13px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
  .sb-search {
    width: calc(100% - 24px); margin: 0 12px 12px; padding: 7px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; color: var(--text); background: var(--surface); outline: none;
  }
  .sb-search:focus { border-color: var(--accent); }
  .sb-section { margin-bottom: 14px; }
  .sb-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); padding: 0 16px 4px; }
  .sb-link {
    display: block; padding: 4px 16px; color: var(--muted); font-weight: 500;
    transition: all .12s; text-decoration: none; border-left: 2px solid transparent;
  }
  .sb-link:hover { color: var(--text); background: var(--surface); text-decoration: none; }
  .sb-link.active { color: var(--accent-text); background: var(--accent-light); border-left-color: var(--accent); }

  /* Main */
  .docs-main { flex: 1; padding: 32px 40px 80px; min-width: 0; }

  /* Hero */
  .hero { margin-bottom: 36px; }
  .hero h1 { font-size: 30px; font-weight: 800; letter-spacing: -.8px; margin-bottom: 8px; }
  .hero p { color: var(--muted); font-size: 15px; max-width: 660px; }
  .hero-meta { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .hero-meta span {
    font-size: 12px; color: var(--muted); background: var(--surface);
    border: 1px solid var(--border); padding: 3px 10px; border-radius: 6px;
  }
  .hero-meta code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

  /* Auth box */
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 36px; }
  .auth-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .auth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .auth-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .auth-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .auth-card p { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .auth-card code { background: var(--accent-light); color: var(--accent-text); padding: 1px 6px; border-radius: 4px; font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; }

  /* Try-it section */
  .try-section { margin-bottom: 40px; scroll-margin-top: 80px; }
  .try-section h2 { font-size: 20px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 14px; }
  .flow-card { background: #0f1117; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
  .flow-head { padding: 12px 18px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 10px; }
  .flow-num { background: var(--accent); color: white; font-size: 11px; font-weight: 700; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .flow-label { color: #e5e7eb; font-size: 14px; font-weight: 600; }
  .flow-desc { color: #6b7280; font-size: 12px; margin-left: auto; }
  .flow-body { padding: 14px 18px; font-family: 'SF Mono','Fira Code',monospace; font-size: 12.5px; line-height: 1.8; color: #e5e7eb; overflow-x: auto; white-space: pre; }
  .fc { color: #4b5563; } .fk { color: #a78bfa; } .ff { color: #93c5fd; } .fs { color: #86efac; } .fu { color: #fbbf24; }

  /* Endpoint group */
  .ep-group { margin-bottom: 44px; scroll-margin-top: 80px; }
  .ep-group-title { font-size: 20px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .ep-group-desc { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  /* Endpoint card */
  .ep-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: border-color .12s; }
  .ep-card:hover { border-color: var(--border-2); }
  .ep-head { padding: 10px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: background .1s; user-select: none; }
  .ep-head:hover { background: var(--surface); }
  .m-badge { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 4px; font-family: 'SF Mono','Fira Code',monospace; min-width: 48px; text-align: center; flex-shrink: 0; }
  .m-get { background: var(--green-light); color: var(--green-text); border: 1px solid var(--green-border); }
  .m-post { background: var(--blue-light); color: var(--blue-text); border: 1px solid var(--blue-border); }
  .m-patch { background: var(--amber-light); color: var(--amber-text); border: 1px solid var(--amber-border); }
  .m-delete { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); }
  .ep-path { font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; font-weight: 600; color: var(--text); }
  .a-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; white-space: nowrap; }
  .a-pub { background: var(--green-light); color: var(--green-text); }
  .a-jwt { background: var(--accent-light); color: var(--accent-text); }
  .a-key { background: var(--amber-light); color: var(--amber-text); }
  .ep-sum { font-size: 12px; color: var(--dim); margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  .ep-chev { color: var(--dim); font-size: 11px; transition: transform .2s; flex-shrink: 0; }
  .ep-card.open .ep-chev { transform: rotate(180deg); }

  .ep-body { display: none; border-top: 1px solid var(--border); padding: 14px 16px; }
  .ep-card.open .ep-body { display: block; }
  .ep-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .ep-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); margin-bottom: 5px; margin-top: 12px; }
  .ep-label:first-child { margin-top: 0; }

  /* Params table */
  .ptbl { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 4px; }
  .ptbl th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: var(--dim); padding: 5px 8px; border-bottom: 1px solid var(--border); }
  .ptbl td { padding: 5px 8px; border-bottom: 1px solid var(--surface-2); vertical-align: top; }
  .ptbl .pn { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; font-weight: 600; color: var(--accent-text); }
  .ptbl .pt { font-size: 11px; color: var(--dim); font-family: 'SF Mono','Fira Code',monospace; }
  .ptbl .pr { color: var(--red); font-size: 10px; font-weight: 700; }

  /* Code block */
  .cb {
    background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 12px 14px;
    overflow-x: auto; font-size: 12px; line-height: 1.6; margin: 5px 0;
    font-family: 'SF Mono','Fira Code','Menlo',monospace; white-space: pre; position: relative;
  }
  .cb .ck { color: #89b4fa; } .cb .cv { color: #a6e3a1; } .cb .cn { color: #f9e2af; } .cb .cp { color: #f38ba8; }

  /* Loading */
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { background: var(--red-light); border: 1px solid var(--red-border); border-radius: 10px; padding: 16px 20px; color: var(--red); margin: 24px 0; }

  @media (max-width: 860px) {
    .docs-layout { flex-direction: column; }
    .sidebar { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 0; max-height: 50vh; }
    .docs-main { padding: 24px 16px 60px; }
    .ep-sum { display: none; }
    .auth-row { grid-template-columns: 1fr; }
    .hero h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="docs-layout">
  <nav class="sidebar" id="sidebar">
    <input class="sb-search" id="search" placeholder="Search endpoints..." data-placeholder-en="Search endpoints..." data-placeholder-zh="搜索接口...">
    <div class="sb-section">
      <div class="sb-title" data-en="Quick Start" data-zh="快速开始">Quick Start</div>
      <a href="#try-it" class="sb-link" data-en="Try It" data-zh="试一试">Try It</a>
      <a href="#auth" class="sb-link" data-en="Authentication" data-zh="认证方式">Authentication</a>
    </div>
    <div id="sb-groups"></div>
  </nav>

  <main class="docs-main">
    <div class="loading" id="loader"><div class="spinner"></div><div data-en="Loading API specification..." data-zh="加载API规范中...">Loading API specification...</div></div>
    <div id="content" style="display:none"></div>
  </main>
</div>

<script>
(function() {
  var BASE = window.location.origin;

  /* Tag display config — order & icons per sprint task S02-08 */
  var TAG_CONFIG = [
    { tag: 'Factories', icon: '\u{1F3ED}' },
    { tag: 'Quotes', icon: '\u{1F4CB}' },
    { tag: 'Orders', icon: '\u{1F4E6}' },
    { tag: 'Capacity & Pricing', icon: '\u{1F4CA}' },
    { tag: 'Escrow & Disputes', icon: '\u{1F512}' },
    { tag: 'QC Inspection', icon: '\u{1F50D}' },
    { tag: 'Trust & Reviews', icon: '\u2B50' },
    { tag: 'Authentication', icon: '\u{1F511}' },
    { tag: 'Admin', icon: '\u{1F6E0}\uFE0F' },
    { tag: 'Platform', icon: '\u2699\uFE0F' }
  ];

  fetch(BASE + '/openapi.json')
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function(err) {
      document.getElementById('loader').innerHTML =
        '<div class="err">Failed to load API spec from <code>/openapi.json</code>: ' + esc(err.message) + '</div>';
    });

  /* ── Helpers ────────────────────────────────────────────── */
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }

  function getAuth(op) {
    if (!op.security || op.security.length === 0) return { label: 'Public', cls: 'a-pub' };
    var hasKey = op.security.some(function(s) { return s.apiKeyAuth !== undefined; });
    if (hasKey) return { label: 'JWT / API Key', cls: 'a-key' };
    return { label: 'JWT', cls: 'a-jwt' };
  }

  function resolveRef(s, schemas) {
    if (!s) return s;
    if (s.$ref) { var n = s.$ref.split('/').pop(); return schemas[n] || {}; }
    return s;
  }

  /* Generate example JSON from schema */
  function schemaExample(s, schemas, depth) {
    if (!s) return '{}';
    depth = depth || 0;
    if (depth > 4) return '"..."';
    s = resolveRef(s, schemas);
    var pad = '  '.repeat(depth), inner = '  '.repeat(depth + 1);

    if (s.allOf) {
      var merged = {};
      s.allOf.forEach(function(part) {
        var r = resolveRef(part, schemas);
        if (r.properties) Object.keys(r.properties).forEach(function(k) { merged[k] = r.properties[k]; });
      });
      return schemaExample({ type: 'object', properties: merged }, schemas, depth);
    }
    if (s.type === 'array' && s.items) {
      return '[\n' + inner + schemaExample(s.items, schemas, depth + 1) + '\n' + pad + ']';
    }
    if (s.type === 'object' || s.properties) {
      var props = s.properties;
      if (!props || Object.keys(props).length === 0) return '{}';
      var lines = Object.keys(props).map(function(k) {
        var v = resolveRef(props[k], schemas);
        var val;
        if (v.example !== undefined) val = JSON.stringify(v.example);
        else if (v.type === 'string') val = v.enum ? '"' + v.enum[0] + '"' : '"string"';
        else if (v.type === 'number' || v.type === 'integer') val = v.example || '0';
        else if (v.type === 'boolean') val = 'true';
        else if (v.type === 'array') val = schemaExample(v, schemas, depth + 1);
        else if (v.type === 'object' || v.properties || v.$ref) val = schemaExample(v, schemas, depth + 1);
        else val = 'null';
        return inner + '<span class="ck">"' + k + '"</span>: ' + colorize(val);
      });
      return '{\n' + lines.join(',\n') + '\n' + pad + '}';
    }
    if (s.type === 'string') return '"' + (s.example || s.enum && s.enum[0] || 'string') + '"';
    if (s.type === 'number' || s.type === 'integer') return String(s.example || 0);
    if (s.type === 'boolean') return 'true';
    return '{}';
  }

  function colorize(v) {
    if (v.charAt(0) === '"') return '<span class="cv">' + v + '</span>';
    if (v === 'true' || v === 'false') return '<span class="cp">' + v + '</span>';
    if (/^[\d.-]+$/.test(v)) return '<span class="cn">' + v + '</span>';
    return v;
  }

  /* ── Render ─────────────────────────────────────────────── */
  function render(spec) {
    var schemas = (spec.components && spec.components.schemas) || {};
    var tagDescs = {};
    (spec.tags || []).forEach(function(t) { tagDescs[t.name] = t.description || ''; });

    /* Group endpoints by tag */
    var groups = {};
    var paths = spec.paths || {};
    Object.keys(paths).forEach(function(path) {
      Object.keys(paths[path]).forEach(function(method) {
        if (method === 'parameters') return;
        var op = paths[path][method];
        (op.tags || ['Other']).forEach(function(tag) {
          if (!groups[tag]) groups[tag] = [];
          groups[tag].push({ method: method, path: path, op: op });
        });
      });
    });

    /* Count endpoints */
    var epCount = 0;
    TAG_CONFIG.forEach(function(tc) { epCount += (groups[tc.tag] || []).length; });

    /* Sidebar */
    var sbHtml = '';
    TAG_CONFIG.forEach(function(tc) {
      if (!groups[tc.tag]) return;
      sbHtml += '<div class="sb-section" data-group="' + slug(tc.tag) + '">';
      sbHtml += '<div class="sb-title">' + tc.icon + ' ' + esc(tc.tag) + '</div>';
      groups[tc.tag].forEach(function(ep) {
        var id = slug(ep.method + '-' + ep.path);
        sbHtml += '<a href="#' + id + '" class="sb-link" data-s="' + (ep.method + ' ' + ep.path + ' ' + (ep.op.summary || '')).toLowerCase() + '">' +
          esc(ep.method.toUpperCase()) + ' ' + esc(ep.path) + '</a>';
      });
      sbHtml += '</div>';
    });
    document.getElementById('sb-groups').innerHTML = sbHtml;

    /* Main content */
    var html = '';

    /* Hero */
    html += '<div class="hero">';
    html += '<h1 data-en="OpenFactory API" data-zh="OpenFactory API 文档">OpenFactory API</h1>';
    html += '<p data-en="' + esc(spec.info.description || '') + '" data-zh="让 AI 代理直接从经过验证的中国制造商采购。即时报价、实时产能、托管保护订单。">' + esc(spec.info.description || '') + '</p>';
    html += '<div class="hero-meta">';
    html += '<span>v' + esc(spec.info.version || '') + '</span>';
    html += '<span>OpenAPI 3.0</span>';
    html += '<span>' + epCount + ' endpoints</span>';
    html += '<span>Base: <code>' + esc(BASE) + '</code></span>';
    html += '<span><a href="' + BASE + '/openapi.json" style="color:var(--accent-text);font-size:12px">Download spec</a></span>';
    html += '</div></div>';

    /* Auth */
    html += '<div id="auth" class="auth-box" style="scroll-margin-top:80px">';
    html += '<h3 data-en="Authentication" data-zh="认证方式">Authentication</h3>';
    html += '<div class="auth-row">';
    html += '<div class="auth-card"><h4>JWT Bearer Token</h4>';
    html += '<p data-en="Login via POST /auth/login, use the returned token:" data-zh="通过 POST /auth/login 登录，使用返回的令牌：">Login via POST /auth/login, use the returned token:</p>';
    html += '<p><code>Authorization: Bearer eyJ...</code></p></div>';
    html += '<div class="auth-card"><h4>API Key (AI agents)</h4>';
    html += '<p data-en="For AI agent partners — request via admin:" data-zh="面向AI代理合作伙伴，通过管理员申请：">For AI agent partners — request via admin:</p>';
    html += '<p><code>x-api-key: sk_live_...</code></p></div>';
    html += '</div></div>';

    /* Try It */
    html += '<div id="try-it" class="try-section">';
    html += '<h2 data-en="Try It — Common Flows" data-zh="试一试 — 常见流程">Try It — Common Flows</h2>';

    html += '<div class="flow-card"><div class="flow-head"><span class="flow-num">1</span>';
    html += '<span class="flow-label" data-en="Discover Factories" data-zh="发现工厂">Discover Factories</span>';
    html += '<span class="flow-desc" data-en="Search &amp; inspect verified manufacturers" data-zh="搜索和查看认证制造商">Search &amp; inspect verified manufacturers</span></div>';
    html += '<div class="flow-body">';
    html += '<span class="fc"># Search public factory directory (no auth needed)</span>\n';
    html += '<span class="fk">curl</span> <span class="fu">' + esc(BASE) + '/factories/public?category=electronics_accessories&amp;verified_only=true&amp;sort=trust_score</span>\n\n';
    html += '<span class="fc"># Get full factory profile with trust score</span>\n';
    html += '<span class="fk">curl</span> <span class="fu">' + esc(BASE) + '/factories/sz-001</span>\n\n';
    html += '<span class="fc"># Check detailed trust breakdown</span>\n';
    html += '<span class="fk">curl</span> <span class="fu">' + esc(BASE) + '/factories/sz-001/trust-breakdown</span>\n\n';
    html += '<span class="fc"># Query live capacity across all factories</span>\n';
    html += '<span class="fk">curl</span> <span class="fu">' + esc(BASE) + '/capacity?category=pcb_assembly&amp;qty=5000</span>';
    html += '</div></div>';

    html += '<div class="flow-card"><div class="flow-head"><span class="flow-num">2</span>';
    html += '<span class="flow-label" data-en="Request a Quote" data-zh="请求报价">Request a Quote</span>';
    html += '<span class="flow-desc" data-en="Get pricing for 5,000 USB-C cables" data-zh="获取5000条USB-C数据线报价">Get pricing for 5,000 USB-C cables</span></div>';
    html += '<div class="flow-body">';
    html += '<span class="fc"># Request a quote from a specific factory</span>\n';
    html += '<span class="fk">curl</span> <span class="ff">-X POST</span> <span class="fu">' + esc(BASE) + '/quotes</span> \\\n';
    html += '  <span class="ff">-H</span> <span class="fs">"Authorization: Bearer $TOKEN"</span> \\\n';
    html += '  <span class="ff">-H</span> <span class="fs">"Content-Type: application/json"</span> \\\n';
    html += '  <span class="ff">-d</span> <span class="fs">\'{\n    "factory_id": "sz-001",\n    "product_description": "USB-C charging cable, 1m, braided nylon",\n    "quantity": 5000,\n    "target_price_usd": 1.50\n  }\'</span>\n\n';
    html += '<span class="fc"># Or broadcast an RFQ to all matching factories</span>\n';
    html += '<span class="fk">curl</span> <span class="ff">-X POST</span> <span class="fu">' + esc(BASE) + '/rfq</span> \\\n';
    html += '  <span class="ff">-H</span> <span class="fs">"Content-Type: application/json"</span> \\\n';
    html += '  <span class="ff">-d</span> <span class="fs">\'{\n    "product_description": "USB-C cable, braided",\n    "quantity": 5000,\n    "categories": ["cable_assembly"],\n    "target_price_usd": 1.50\n  }\'</span>';
    html += '</div></div>';

    html += '<div class="flow-card"><div class="flow-head"><span class="flow-num">3</span>';
    html += '<span class="flow-label" data-en="Place Order &amp; Track Milestones" data-zh="下单和跟踪里程碑">Place Order &amp; Track Milestones</span>';
    html += '<span class="flow-desc" data-en="Order, escrow, milestone tracking" data-zh="下单、托管、里程碑跟踪">Order, escrow, milestone tracking</span></div>';
    html += '<div class="flow-body">';
    html += '<span class="fc"># Place order from accepted quote</span>\n';
    html += '<span class="fk">curl</span> <span class="ff">-X POST</span> <span class="fu">' + esc(BASE) + '/orders</span> \\\n';
    html += '  <span class="ff">-H</span> <span class="fs">"Authorization: Bearer $TOKEN"</span> \\\n';
    html += '  <span class="ff">-H</span> <span class="fs">"Content-Type: application/json"</span> \\\n';
    html += '  <span class="ff">-d</span> <span class="fs">\'{"quote_id": "q-abc123", "buyer_id": "buyer-123"}\'</span>\n\n';
    html += '<span class="fc"># Lock 30% deposit escrow via Stripe</span>\n';
    html += '<span class="fk">curl</span> <span class="ff">-X POST</span> <span class="fu">' + esc(BASE) + '/orders/ord-xyz789/escrow/lock</span> \\\n';
    html += '  <span class="ff">-H</span> <span class="fs">"Authorization: Bearer $TOKEN"</span>\n\n';
    html += '<span class="fc"># Track order with milestones + escrow events</span>\n';
    html += '<span class="fk">curl</span> <span class="ff">-H</span> <span class="fs">"Authorization: Bearer $TOKEN"</span> \\\n';
    html += '  <span class="fu">' + esc(BASE) + '/orders/ord-xyz789</span>\n\n';
    html += '<span class="fc"># Check real-time order health score</span>\n';
    html += '<span class="fk">curl</span> <span class="ff">-H</span> <span class="fs">"Authorization: Bearer $TOKEN"</span> \\\n';
    html += '  <span class="fu">' + esc(BASE) + '/orders/ord-xyz789/health</span>';
    html += '</div></div>';
    html += '</div>'; /* end try-section */

    /* Endpoint groups */
    TAG_CONFIG.forEach(function(tc) {
      var eps = groups[tc.tag];
      if (!eps) return;
      var s = slug(tc.tag);

      html += '<div id="' + s + '" class="ep-group">';
      html += '<div class="ep-group-title">' + tc.icon + ' ' + esc(tc.tag) + '</div>';
      html += '<div class="ep-group-desc">' + esc(tagDescs[tc.tag] || '') + '</div>';

      eps.forEach(function(ep) {
        var auth = getAuth(ep.op);
        var id = slug(ep.method + '-' + ep.path);

        html += '<div class="ep-card" id="' + id + '" data-s="' + (ep.method + ' ' + ep.path + ' ' + (ep.op.summary || '')).toLowerCase() + '">';

        /* Header */
        html += '<div class="ep-head" onclick="this.parentElement.classList.toggle(\'open\')">';
        html += '<span class="m-badge m-' + ep.method + '">' + ep.method.toUpperCase() + '</span>';
        html += '<span class="ep-path">' + esc(ep.path) + '</span>';
        html += '<span class="' + auth.cls + ' a-badge">' + auth.label + '</span>';
        html += '<span class="ep-sum">' + esc(ep.op.summary || '') + '</span>';
        html += '<span class="ep-chev">\u25BC</span>';
        html += '</div>';

        /* Body */
        html += '<div class="ep-body">';
        if (ep.op.description) html += '<div class="ep-desc">' + esc(ep.op.description) + '</div>';

        /* Parameters */
        if (ep.op.parameters && ep.op.parameters.length > 0) {
          html += '<div class="ep-label">Parameters</div>';
          html += '<table class="ptbl"><tr><th>Name</th><th>In</th><th>Type</th><th>Description</th></tr>';
          ep.op.parameters.forEach(function(p) {
            var t = p.schema ? (p.schema.type || '') : '';
            if (p.schema && p.schema.enum) t += ' (' + p.schema.enum.slice(0, 4).join(', ') + (p.schema.enum.length > 4 ? ', ...' : '') + ')';
            html += '<tr><td><span class="pn">' + esc(p.name) + '</span>' + (p.required ? ' <span class="pr">*</span>' : '') +
              '</td><td>' + esc(p.in) + '</td><td><span class="pt">' + esc(t) + '</span></td><td>' + esc(p.description || '') + '</td></tr>';
          });
          html += '</table>';
        }

        /* Request body */
        if (ep.op.requestBody) {
          var ct = ep.op.requestBody.content;
          if (ct) {
            var ctKey = Object.keys(ct)[0];
            var rbSchema = ct[ctKey] && ct[ctKey].schema;
            if (rbSchema) {
              var resolved = resolveRef(rbSchema, schemas);
              html += '<div class="ep-label">Request Body <span style="font-weight:400;text-transform:none;letter-spacing:0">' + esc(ctKey) + '</span></div>';
              if (resolved.properties) {
                html += '<table class="ptbl"><tr><th>Field</th><th>Type</th><th>Description</th></tr>';
                Object.keys(resolved.properties).forEach(function(k) {
                  var p = resolveRef(resolved.properties[k], schemas);
                  var t = p.type || '';
                  if (p.enum) t += ' (' + p.enum.slice(0, 4).join(', ') + (p.enum.length > 4 ? ', ...' : '') + ')';
                  if (p.format) t += ' [' + p.format + ']';
                  var req = resolved.required && resolved.required.indexOf(k) !== -1;
                  html += '<tr><td><span class="pn">' + esc(k) + '</span>' + (req ? ' <span class="pr">*</span>' : '') +
                    '</td><td><span class="pt">' + esc(t) + '</span></td><td>' + esc(p.description || '') + '</td></tr>';
                });
                html += '</table>';
              }
              /* Example from spec */
              var example = ct[ctKey].example;
              if (example) {
                html += '<div class="ep-label">Example Request</div>';
                html += '<div class="cb">' + syntaxHL(JSON.stringify(example, null, 2)) + '</div>';
              }
            }
          }
        }

        /* Responses */
        if (ep.op.responses) {
          html += '<div class="ep-label">Responses</div>';
          Object.keys(ep.op.responses).forEach(function(code) {
            var resp = ep.op.responses[code];
            html += '<div style="margin-top:6px"><strong>' + code + '</strong> — ' + esc(resp.description || '') + '</div>';
            if (resp.content && resp.content['application/json']) {
              var rs = resp.content['application/json'].schema;
              var re = resp.content['application/json'].example;
              if (re) {
                html += '<div class="cb">' + syntaxHL(JSON.stringify(re, null, 2)) + '</div>';
              } else if (rs) {
                html += '<div class="cb">' + schemaExample(rs, schemas, 0) + '</div>';
              }
            }
          });
        }

        html += '</div></div>'; /* end ep-body, ep-card */
      });

      html += '</div>'; /* end ep-group */
    });

    document.getElementById('loader').style.display = 'none';
    var contentEl = document.getElementById('content');
    contentEl.style.display = '';
    contentEl.innerHTML = html;

    /* Sidebar active scroll-spy */
    var sLinks = document.querySelectorAll('#sb-groups .sb-link');
    function updateActive() {
      var y = window.scrollY + 100;
      var active = null;
      document.querySelectorAll('.ep-card').forEach(function(el) {
        if (el.offsetTop <= y) active = el.id;
      });
      sLinks.forEach(function(l) { l.classList.toggle('active', l.getAttribute('href') === '#' + active); });
    }
    window.addEventListener('scroll', updateActive, { passive: true });
    updateActive();

    /* Search filter */
    document.getElementById('search').addEventListener('input', function() {
      var q = this.value.toLowerCase().trim();
      sLinks.forEach(function(a) {
        a.style.display = !q || a.getAttribute('data-s').indexOf(q) !== -1 ? '' : 'none';
      });
      document.querySelectorAll('.ep-card[data-s]').forEach(function(c) {
        c.style.display = !q || c.getAttribute('data-s').indexOf(q) !== -1 ? '' : 'none';
      });
      document.querySelectorAll('.ep-group').forEach(function(g) {
        var vis = g.querySelectorAll('.ep-card:not([style*="display: none"])');
        g.style.display = !q || vis.length > 0 ? '' : 'none';
      });
    });

    /* Apply language if nav.js loaded */
    if (window.applyLang) window.applyLang(localStorage.getItem('lang') || 'en');
  }

  function syntaxHL(json) {
    return json.replace(/("(?:\\.|[^"\\])*")\s*:/g, '<span class="ck">$1</span>:')
               .replace(/:\s*("(?:\\.|[^"\\])*")/g, ': <span class="cv">$1</span>')
               .replace(/:\s*(\d+\.?\d*)/g, ': <span class="cn">$1</span>')
               .replace(/:\s*(true|false|null)/g, ': <span class="cp">$1</span>');
  }
})();
</script>
<script src="/nav.js"></script>
</body>
</html>
