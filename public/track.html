<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order — OpenFactory</title>
<style>
  :root {
    --bg:#0a0a0a; --surface:#111111; --s2:#181818; --s3:#1f1f1f;
    --border:#232323; --b2:#2e2e2e; --b3:#3a3a3a;
    --text:#ebebeb; --muted:#888; --dim:#555;
    --purple:#7c3aed; --purple-h:#6d28d9; --purple-l:#a78bfa; --purple-xl:#c4b5fd;
    --purple-dim:#130a26; --purple-b:#3b1d8f;
    --green:#16a34a; --green-h:#15803d; --green-dim:#051a0d; --green-t:#4ade80; --green-b:#166534;
    --amber:#d97706; --amber-dim:#1a1000; --amber-t:#fbbf24; --amber-b:#92400e;
    --red:#dc2626; --red-dim:#1a0505; --red-t:#f87171; --red-b:#7f1d1d;
    --cyan:#06b6d4;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; line-height: 1.5; min-height: 100vh; }
  a { text-decoration: none; color: inherit; }

  .main { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ── HEADER ──────────────────────────────────── */
  .track-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--muted); background: var(--s2);
    border: 1px solid var(--b2); border-radius: 8px;
    padding: 7px 14px; transition: all .15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--b3); }

  /* ── STALE BANNER ────────────────────────────── */
  .stale-banner {
    display: none; background: var(--amber-dim); border: 1px solid var(--amber-b);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
    font-size: 13px; color: var(--amber-t); font-weight: 600;
    align-items: center; gap: 10px;
  }
  .stale-banner.show { display: flex; }

  /* ── ORDER HERO ──────────────────────────────── */
  .order-hero {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px 24px; margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .order-hero-title { font-size: 18px; font-weight: 800; color: white; }
  .order-hero-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  }
  .sp-pending { background: var(--amber-dim); color: var(--amber-t); border: 1px solid var(--amber-b); }
  .sp-active { background: var(--purple-dim); color: var(--purple-l); border: 1px solid var(--purple-b); }
  .sp-done { background: var(--green-dim); color: var(--green-t); border: 1px solid var(--green-b); }
  .sp-bad { background: var(--red-dim); color: var(--red-t); border: 1px solid var(--red-b); }

  /* ── VERTICAL TIMELINE ───────────────────────── */
  .timeline { margin-bottom: 32px; }
  .tl-node { display: flex; gap: 16px; position: relative; }
  .tl-rail { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px; }
  .tl-dot {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; z-index: 1;
  }
  .tl-dot.done { background: var(--green); color: white; font-weight: 700; }
  .tl-dot.pending { background: var(--s3); color: var(--dim); border: 2px solid var(--b2); }
  .tl-dot.fail { background: var(--red); color: white; font-weight: 700; }
  .tl-line { flex: 1; width: 2px; margin: 4px 0; min-height: 20px; }
  .tl-line.done { background: var(--green); }
  .tl-line.pending { background: var(--b2); }
  .tl-body { flex: 1; padding-top: 6px; padding-bottom: 24px; }
  .tl-node:last-child .tl-body { padding-bottom: 0; }
  .tl-title { font-size: 14px; font-weight: 700; color: white; }
  .tl-title.pending { color: var(--dim); font-weight: 600; }
  .tl-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tl-note {
    font-size: 12px; color: var(--muted); margin-top: 8px;
    background: var(--s2); border-radius: 8px; padding: 8px 12px;
    border-left: 3px solid var(--b3);
  }
  .tl-photos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tl-photo {
    width: 56px; height: 56px; border-radius: 8px; object-fit: cover;
    border: 1px solid var(--b2); cursor: pointer; transition: transform .15s;
    background: var(--s3);
  }
  .tl-photo:hover { transform: scale(1.1); box-shadow: 0 2px 12px rgba(0,0,0,.4); }

  /* ── ESCROW SECTION ──────────────────────────── */
  .escrow-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 22px 24px;
  }
  .escrow-title { font-size: 14px; font-weight: 700; color: white; margin-bottom: 14px; }
  .progress-track {
    height: 10px; background: var(--s3); border-radius: 6px; overflow: hidden;
    display: flex;
  }
  .progress-seg { height: 100%; transition: background .3s; }
  .progress-seg.filled { background: var(--green); }
  .progress-seg.empty { background: transparent; }
  .progress-seg + .progress-seg { border-left: 2px solid var(--bg); }
  .progress-labels { display: flex; margin-top: 8px; font-size: 11px; color: var(--muted); }
  .progress-labels span { text-align: center; }
  .escrow-events-list { margin-top: 18px; display: flex; flex-direction: column; gap: 6px; }
  .ee-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--muted); padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .ee-row:last-child { border: none; }
  .ee-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .ee-time { font-size: 10px; color: var(--dim); flex-shrink: 0; width: 90px; }

  /* ── STATES ──────────────────────────────────── */
  .state-wrap { text-align: center; padding: 80px 0; }
  .loader { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.2); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LIGHTBOX ────────────────────────────────── */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.88); align-items: center; justify-content: center;
    cursor: pointer;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 10px; }

  @media (max-width: 600px) {
    .order-hero { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightbox-img" src="" alt="Photo">
</div>

<div class="main">
  <div class="track-header">
    <a class="back-link" href="/buyer.html">&#8592; Back</a>
    <div>
      <div style="font-size:18px;font-weight:800;color:white;">Order Timeline</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">Real-time production milestones</div>
    </div>
  </div>

  <div class="stale-banner" id="stale-banner">
    <span style="font-size:18px;">&#9888;&#65039;</span>
    <span id="stale-text">No updates in over 5 days. Contact your factory rep.</span>
  </div>

  <div class="state-wrap" id="loader"><span class="loader"></span></div>
  <div class="state-wrap" id="error" style="display:none;">
    <div style="font-size:36px;margin-bottom:12px;">&#128270;</div>
    <div style="font-size:18px;font-weight:700;color:var(--red-t);margin-bottom:6px;">Order not found</div>
    <div style="font-size:13px;color:var(--muted);" id="error-msg">Check the order ID and try again.</div>
  </div>

  <div id="content" style="display:none;">
    <div class="order-hero" id="order-hero"></div>
    <div class="timeline" id="timeline"></div>
    <div class="escrow-section" id="escrow-section"></div>
  </div>
</div>

<script>
(function() {
  var API = window.location.origin;

  var MILESTONE_SEQ = [
    'material_received','production_started','qc_in_progress',
    'qc_pass','qc_fail','ready_for_shipment','shipped'
  ];
  var MILESTONE_LABELS = {
    material_received:'Material Received',
    production_started:'Production Started',
    qc_in_progress:'QC In Progress',
    qc_pass:'QC Pass',
    qc_fail:'QC Fail',
    ready_for_shipment:'Ready for Shipment',
    shipped:'Shipped'
  };
  var MILESTONE_ICONS = {
    material_received:'\u{1F4E6}',
    production_started:'\u2699\uFE0F',
    qc_in_progress:'\u{1F50D}',
    qc_pass:'\u2705',
    qc_fail:'\u274C',
    ready_for_shipment:'\u{1F4CB}',
    shipped:'\u{1F69A}'
  };

  var ESCROW_LABELS = {
    pending_deposit:'Pending Deposit',
    deposit_held:'Deposit Held (30%)',
    production_released:'Production Released (70%)',
    qc_released:'QC Released (100%)',
    final_released:'Final Released',
    disputed:'Disputed',
    refunded:'Refunded'
  };

  // 3 segments: 30/40/30
  var ESCROW_FILLED = {
    pending_deposit:0, deposit_held:1,
    production_released:2, qc_released:3,
    final_released:3, disputed:0, refunded:0
  };

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', {
      month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
  }

  function shortDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }

  function daysSince(iso) {
    if (!iso) return Infinity;
    return (Date.now() - new Date(iso).getTime()) / (1000 * 60 * 60 * 24);
  }

  function openPhoto(url) {
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox').classList.add('show');
  }
  window.openPhoto = openPhoto;

  // ── Load order ──
  var params = new URLSearchParams(location.search);
  var orderId = params.get('order_id');
  if (!orderId) {
    showError('No order_id provided in URL.');
    return;
  }

  var token = localStorage.getItem('auth_token') || '';
  var apiKey = localStorage.getItem('of_api_key') || '';
  var headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  else if (apiKey) headers['Authorization'] = 'Bearer ' + apiKey;

  fetch(API + '/orders/' + encodeURIComponent(orderId), { headers: headers })
    .then(function(r) {
      if (!r.ok) throw new Error('Order ' + orderId + ' not found');
      return r.json();
    })
    .then(render)
    .catch(function(e) { showError(e.message); });

  function showError(msg) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }

  function render(order) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    var milestones = order.milestones || [];
    var escrowEvents = order.escrow_events || [];
    var doneMap = {};
    milestones.forEach(function(m) { doneMap[m.milestone] = m; });

    // ── Stale check ──
    if (milestones.length > 0) {
      var latest = milestones[milestones.length - 1];
      var days = daysSince(latest.created_at);
      if (days > 5) {
        document.getElementById('stale-text').textContent =
          'No updates in ' + Math.floor(days) + ' days. Last: ' +
          (MILESTONE_LABELS[latest.milestone] || latest.milestone) + '. Contact your factory rep.';
        document.getElementById('stale-banner').classList.add('show');
      }
    }

    // ── Order hero ──
    var st = order.status || 'pending';
    var pillClass = st === 'delivered' ? 'sp-done'
      : st === 'disputed' ? 'sp-bad'
      : st === 'pending' ? 'sp-pending' : 'sp-active';
    document.getElementById('order-hero').innerHTML =
      '<div>' +
        '<div class="order-hero-title">' + esc(order.order_id) + '</div>' +
        '<div class="order-hero-sub">' +
          (order.quantity ? order.quantity.toLocaleString() + ' units' : '') +
          (order.total_price_usd ? ' &middot; $' + Number(order.total_price_usd).toLocaleString() : '') +
        '</div>' +
      '</div>' +
      '<span class="status-pill ' + pillClass + '">' + esc(st.replace(/_/g, ' ')) + '</span>';

    // ── Vertical timeline ──
    var html = '';
    MILESTONE_SEQ.forEach(function(key, i) {
      var done = !!doneMap[key];
      var m = doneMap[key];
      var isFail = key === 'qc_fail';
      var isLast = i === MILESTONE_SEQ.length - 1;

      var dotClass = 'tl-dot ' + (done ? (isFail ? 'fail' : 'done') : 'pending');
      var icon = done ? '\u2713' : MILESTONE_ICONS[key];

      // Photos
      var photos = [];
      if (m && m.photo_urls) {
        var raw = m.photo_urls;
        if (typeof raw === 'string') { try { raw = JSON.parse(raw); } catch(e) { raw = []; } }
        if (Array.isArray(raw)) photos = raw;
      }

      var photosHtml = '';
      if (photos.length) {
        photosHtml = '<div class="tl-photos">' +
          photos.map(function(url) {
            return '<img class="tl-photo" src="' + esc(url) + '" alt="photo" onclick="openPhoto(\'' + esc(url).replace(/'/g, "\\'") + '\')" onerror="this.style.display=\'none\'">';
          }).join('') + '</div>';
      }

      var noteHtml = '';
      if (m && m.note) noteHtml = '<div class="tl-note">' + esc(m.note) + '</div>';

      html += '<div class="tl-node">' +
        '<div class="tl-rail">' +
          '<div class="' + dotClass + '">' + icon + '</div>' +
          (!isLast ? '<div class="tl-line ' + (done ? 'done' : 'pending') + '"></div>' : '') +
        '</div>' +
        '<div class="tl-body">' +
          '<div class="tl-title ' + (done ? '' : 'pending') + '">' + MILESTONE_LABELS[key] + '</div>' +
          (done
            ? '<div class="tl-time">' + fmtDate(m.created_at) + '</div>'
            : '<div class="tl-time" style="color:var(--dim);">Pending</div>') +
          noteHtml + photosHtml +
        '</div>' +
      '</div>';
    });
    document.getElementById('timeline').innerHTML = html;

    // ── Escrow section ──
    var es = order.escrow_status || 'pending_deposit';
    var filled = ESCROW_FILLED[es] || 0;
    var segs = [
      { pct: 30, label: '30% Deposit' },
      { pct: 40, label: '40% Production' },
      { pct: 30, label: '30% Shipment' }
    ];

    var esBadgeClass = es === 'final_released' || es === 'qc_released' ? 'sp-done'
      : es === 'disputed' || es === 'refunded' ? 'sp-bad' : 'sp-active';

    var eventsHtml = '';
    if (escrowEvents.length) {
      eventsHtml = '<div class="escrow-events-list">';
      escrowEvents.forEach(function(ev) {
        eventsHtml += '<div class="ee-row">' +
          '<span class="ee-dot"></span>' +
          '<span class="ee-time">' + shortDate(ev.created_at) + '</span>' +
          '<span>' + esc(ev.from_status) + ' &rarr; ' + esc(ev.to_status) +
            (ev.amount_usd ? ' &middot; $' + Number(ev.amount_usd).toLocaleString() : '') +
            (ev.note ? ' &middot; ' + esc(ev.note) : '') +
          '</span></div>';
      });
      eventsHtml += '</div>';
    }

    document.getElementById('escrow-section').innerHTML =
      '<div class="escrow-title">Escrow Status</div>' +
      '<div style="margin-bottom:14px;"><span class="status-pill ' + esBadgeClass + '">' + esc(ESCROW_LABELS[es] || es) + '</span></div>' +
      '<div class="progress-track">' +
        segs.map(function(s, i) {
          return '<div class="progress-seg ' + (i < filled ? 'filled' : 'empty') + '" style="width:' + s.pct + '%;"></div>';
        }).join('') +
      '</div>' +
      '<div class="progress-labels">' +
        segs.map(function(s) { return '<span style="width:' + s.pct + '%;">' + s.label + '</span>'; }).join('') +
      '</div>' +
      eventsHtml;
  }
})();
</script>
<div style="text-align:center;padding:12px;font-size:12px;color:#555;">Shenzhen, China &middot; hello@openfactory.ai &middot; ICP&#22791;&#26696;&#30003;&#35831;&#20013;</div>
<script src="/nav.js"></script>
</body>
</html>
